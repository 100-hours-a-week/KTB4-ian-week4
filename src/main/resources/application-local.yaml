spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${LOCAL_H2_PATH:./data/community};DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none

  storage:
    root: ${LOCAL_STORAGE_PATH:./storage/images}
    profile-directory: profile
    feed-directory: feed
