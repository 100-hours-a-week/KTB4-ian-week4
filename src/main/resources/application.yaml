spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  security:
    user:
      name: user
      password: 1029

app:
  frontend-origin: http://127.0.0.1:5500
  cookie:
    secure: false
    same-site: Lax

jwt:
  issuer: ian-community
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 600
  refresh-token-expiration-seconds: 604800

csrf:
  secret: ${CSRF_SECRET:${JWT_SECRET}}
