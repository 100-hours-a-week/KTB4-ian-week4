spring:
  #server:
    #port: 80 # 내장 톰캣 포트번호

  # H2 Database 설정
  datasource:
    driver-class-name: org.h2.Driver

    # H2 DB 연결 주소 - 인 메모리 모드
    url: jdbc:h2:file:./data/community;AUTO_SERVER=TRUE

    # H2 DB 접속 ID  - 사용자 지정
    username: sa

    # H2 DB 접속 PW  - 사용자 지정
    password:

  # H2 Console 설정
  h2:
    console: # H2 DB를 웹에서 관리할 수 있는 기능
      enabled: true      # H2 Console 사용 여부
      path: /h2-console  # H2 Console 접속 주소

  # JPA 설정
  jpa:
    # database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.H2Dialect
        format_sql: true   # 쿼리 로그 포맷 - 정렬
        show_sql: true     # 쿼리 로그 출력

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    user:
      name: user
      password: 1029

app:
  frontend-origin: http://127.0.0.1:5500

  cookie:
    secure: false      # 서비스 시에는 true로 설정, 테스트 진행 시에만 false
    same-site: Lax

  storage:
    root: ${LOCAL_STORAGE_PATH:./storage/images}
    profile-directory: profile
    feed-directory: feed
    cleanup-cron: "0 0 3 * * *"

jwt:
  issuer: ian-community
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 600        # 엑시스 토큰 만료 시간 설정 - 10분 설정
  refresh-token-expiration-seconds: 604800    # 리프레쉬 토큰 만료 시간 설정 - 7일 설정
